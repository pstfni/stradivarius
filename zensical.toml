[project]
site_name = "stradivarius"
site_description = "TUI playlist browser and composer. Based on chopin"
site_author = "pstfni"
site_url = "https://pstfni.github.io/stradivarius"
repo_url = "https://github.com/pstfni/stradivarius"
repo_name = "pstfni/stradivarius"

docs_dir = "docs"
nav = ["index.md"]

[project.theme]
language = "en"
features = [
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
primary = "brown"
accent = "purple"
media = "(prefers-color-scheme: light)"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "brown"
accent = "purple"
media = "(prefers-color-scheme: dark)"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[project.markdown_extensions.tables]
[project.markdown_extensions.admonition]
[project.markdown_extensions.abbr]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.pymdownx.emoji]

[project.markdown_extensions."pymdownx.highlight"]
anchor_linenums = true

[project.markdown_extensions."pymdownx.inlinehilite"]
[project.markdown_extensions."pymdownx.snippets"]
[project.markdown_extensions."pymdownx.superfences"]
[project.markdown_extensions."pymdownx.details"]

[project.markdown_extensions."pymdownx.tasklist"]
custom_checkbox = true

[project.plugins.search]